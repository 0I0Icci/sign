name: Weibo Super Topic Sign

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC = 08:00 Asia/Shanghai.
    - cron: "21 03 * * *"
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright
        run: |
          npm init -y

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: weibo-sign-debug
          path: artifacts/
