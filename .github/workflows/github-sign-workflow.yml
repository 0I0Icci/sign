name: Weibo Super Topic Sign

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC = 08:00 Asia/Shanghai.
    - cron: "7 6 * * *"
    - cron: "17 6 * * *"
    - cron: "27 6 * * *"
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Sign in Weibo super topics
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          WEIBO_COOKIE_1: ${{ secrets.WEIBO_COOKIE_1 }}
          WEIBO_COOKIE_2: ${{ secrets.WEIBO_COOKIE_2 }}
          WEIBO_COOKIE_3: ${{ secrets.WEIBO_COOKIE_3 }}
          WEIBO_COOKIE_4: ${{ secrets.WEIBO_COOKIE_4 }}
          WEIBO_COOKIE_5: ${{ secrets.WEIBO_COOKIE_5 }}
          WEIBO_ACCOUNT_LABELS: ${{ secrets.WEIBO_ACCOUNT_LABELS }}
          WEIBO_SUPERTOPIC_URLS: ${{ secrets.WEIBO_SUPERTOPIC_URLS }}
        run: node scripts/sign-weibo.mjs

      - name: Send sign report email
        if: always()
        env:
          NOTIFY_MODE: sign
          NOTIFY_EMAIL_TO: 2948408582@qq.com
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/notify.mjs

      - name: Upload sign artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weibo-sign-report
          path: artifacts/
