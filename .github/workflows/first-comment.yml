name: Weibo First Comment

on:
  schedule:
    # GitHub Actions uses UTC. 06:08 UTC = 14:08 Asia/Shanghai.
    - cron: "8 6 * * *"
  workflow_dispatch:

jobs:
  first-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Watch target super topic and comment first
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          FIRST_COMMENT_POLL_SECONDS: "5"
        run: node scripts/first-comment-weibo.mjs

      - name: Send first-comment report email
        if: always()
        env:
          NOTIFY_MODE: first-comment
          NOTIFY_EMAIL_TO: 2948408582@qq.com
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/notify.mjs

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weibo-first-comment-visual
          path: artifacts/
